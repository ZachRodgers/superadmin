<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parallel Superadmin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #121212;
            color: #fff;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background-color: #1c1c1c;
        }
        header h1 {
            margin: 0;
            font-size: 24px;
        }
        header .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        header .logo span {
            background: #fff;
            color: #000;
            padding: 2px 8px;
            font-weight: 700;
            border-radius: 4px;
        }
        header button {
            background-color: #333;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
        }
        .search {
            padding: 20px;
            background-color: #1c1c1c;
            display: flex;
            justify-content: center;
        }
        .search input {
            width: 50%;
            padding: 10px;
            border-radius: 4px;
            border: none;
            background-color: #333;
            color: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px auto;
            max-width: 1200px;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background-color: #1c1c1c;
        }
        .devices {
            display: flex;
            gap: 5px;
        }
        .devices span {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .devices .green {
            background-color: #4caf50;
        }
        .devices .red {
            background-color: #f44336;
        }
        .open-link {
            color: #00bcd4;
            text-decoration: none;
        }
        .open-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <h1>Parallel</h1>
            <span>SUPERADMIN</span>
        </div>
        <button>Logout</button>
    </header>

    <div class="search">
        <input type="text" placeholder="Search LotID, Customer, Date or Location">
    </div>

    <table>
        <thead>
            <tr>
                <th>LotID</th>
                <th>Customer</th>
                <th>Location</th>
                <th>Purchase Date</th>
                <th>Devices</th>
                <th>Admin Portal</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>0000-0001</td>
                <td>Parallel Parking Solutions Inc.</td>
                <td>Ottawa, Ontario, Canada</td>
                <td>01/01/2024</td>
                <td class="devices">
                    <span class="green"></span>
                    <span class="green"></span>
                </td>
                <td><a href="#" class="open-link">Open</a></td>
            </tr>
            <tr>
                <td>0000-0002</td>
                <td>Company Name</td>
                <td>City, Province/State, Country</td>
                <td>01/01/2024</td>
                <td class="devices">
                    <span class="red"></span>
                    <span class="red"></span>
                    <span class="red"></span>
                    <span class="red"></span>
                    <span class="red"></span>
                </td>
                <td><a href="#" class="open-link">Open</a></td>
            </tr>
            <!-- Add more rows as necessary, similar to above -->
        </tbody>
    </table>
</body>
</html>
