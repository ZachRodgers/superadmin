<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Device Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #1E1F21;
            color: #E5E5E5;
            display: flex;
        }
        .sidebar {
            width: 400px;
            background-color: #272A30;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100vh;
        }
        .sidebar .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .sidebar .logo img {
            height: 40px;
        }
        .sidebar .menu {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .sidebar .menu li {
            padding: 10px 20px;
            border-radius: 4px;
            background-color: #363941;
            cursor: pointer;
            color: #E5E5E5;
        }
        .sidebar .menu li.active {
            background-color: #1782FF;
        }
        .sidebar .menu li a {
            color: inherit;
            text-decoration: none;
        }
        .sidebar .footer {
            margin-top: auto;
        }
        .sidebar .footer a {
            color: #E5E5E5;
        }
        .content {
            flex-grow: 1;
            padding: 20px;
            box-sizing: border-box;
            max-width: 1280px;
            margin: auto;
        }
        .content h1 {
            margin: 0 0 10px;
            font-size: 24px;
        }
        .device-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .device {
            background-color: #363941;
            padding: 15px 20px;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid transparent;
        }
        .device:nth-child(even) {
            background-color: #272A30;
        }
        .device.online {
            border-left-color: #4CAF50;
        }
        .device.offline {
            border-left-color: #F44336;
        }
        .device-info {
            flex-grow: 1;
        }
        .device-info h2 {
            margin: 0;
            font-size: 18px;
        }
        .device-info p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #A8A8B8;
        }
        .device-actions {
            display: flex;
            gap: 10px;
        }
        .device-actions button {
            background-color: #363941;
            color: #E5E5E5;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .device-actions button.disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        .device-actions button img {
            height: 14px;
            width: 14px;
        }
        .network-info {
            font-size: 12px;
            text-align: right;
            color: #A8A8B8;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <img src="https://raw.githubusercontent.com/ZachRodgers/superadmin/main/LogotypeThin.svg" alt="Logo">
        </div>
        <div>
            <button class="device-id" style="background-color: #363941; color: #E5E5E5; width: 100%;">0000-0001</button>
            <a href="#" style="display: block; margin: 10px 0;">&lt; Back</a>
        </div>
        <ul class="menu">
            <li class="active"><a href="#">Device Manager</a></li>
            <li><a href="#">Vehicle Log</a></li>
            <li><a href="#">Billing Calculator</a></li>
            <li><a href="#">Customer</a></li>
        </ul>
        <div class="footer">
            <a href="#">Admin Portal</a>
            <br>
            <a href="#">Send Message</a>
        </div>
    </div>
    <div class="content">
        <h1>Device Manager</h1>
        <div class="device-list">
            <div class="device online">
                <div class="device-info">
                    <h2>0000-0001a</h2>
                    <p>Online 32°C<br>Updated 10 seconds ago.</p>
                </div>
                <div class="device-actions">
                    <button><img src="https://raw.githubusercontent.com/ZachRodgers/superadmin/main/power.svg" alt="Shutdown Icon">Shutdown</button>
                    <button><img src="https://raw.githubusercontent.com/ZachRodgers/superadmin/main/reboot.svg" alt="Reboot Icon">Reboot</button>
                </div>
                <div class="network-info">
                    <p>Network<br>Ping 132ms<br>↑ 128mbps ↓ 101mbps</p>
                </div>
            </div>
            <div class="device offline">
                <div class="device-info">
                    <h2>0000-0001b</h2>
                    <p>Offline<br>Last seen 3 days ago.</p>
                </div>
                <div class="device-actions">
                    <button class="disabled"><img src="https://raw.githubusercontent.com/ZachRodgers/superadmin/main/power.svg" alt="Shutdown Icon">Shutdown</button>
                    <button class="disabled"><img src="https://raw.githubusercontent.com/ZachRodgers/superadmin/main/reboot.svg" alt="Reboot Icon">Reboot</button>
                </div>
                <div class="network-info">
                    <p>Network<br>N/A</p>
                </div>
            </div>
            <div class="device">
                <div class="device-info">
                    <h2>0000-0001c</h2>
                    <p>+ Add New Device</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
